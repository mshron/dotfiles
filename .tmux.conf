# === Prefix ===
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# === General ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g display-time 2000
set -g escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# === Mouse ===
set -g mouse on

# Slow down scroll — 3 lines per tick (default is 5)
bind -T copy-mode-vi WheelUpPane   send -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 1 scroll-down

# === Vi mode ===
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# === Splits (intuitive keys) ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# === Pane navigation (vim-style) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Pane resizing ===
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Reload config ===
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# === Status bar ===
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour248] %H:%M  %d-%b-%y "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "
setw -g window-status-format " #I:#W#{?window_silence_flag, *,} "

# === Pane cycling (zoom + rotate) ===
# Tab unzooms, moves to next pane, then re-zooms
bind -r Tab if-shell '[ "#{window_zoomed_flag}" = "1" ]' \
  'resize-pane -Z \; select-pane -t :.+ \; resize-pane -Z' \
  'select-pane -t :.+ \; resize-pane -Z'

# === Silence monitoring ===
# Off by default; toggle per-window with prefix S for Claude Code windows
set -g monitor-activity off
set -g monitor-silence 0
set -g visual-silence off
setw -g window-status-activity-style "fg=colour39,bold"

# Toggle silence monitoring for current window (prefix b)
bind b if-shell 'tmux show -wv monitor-silence | grep -q "^[1-9]"' \
  'setw monitor-silence 0 ; display "Silence monitor: OFF"' \
  'setw monitor-silence 2 ; display "Silence monitor: ON (2s)"'

# === Pane titles ===
# Show pane titles in border (name panes with: printf '\033]2;claude-1\033\\')
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{?pane_title,#{pane_title},#{pane_current_command}} "

# === Pane borders ===
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# === Vim-Tmux Navigator ===
# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
# Note: C-l no longer clears terminal in tmux panes. Use 'prefix C-l' or type 'clear'.
